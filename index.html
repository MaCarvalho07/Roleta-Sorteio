<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta de Sorteio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #1a1a22;
    --surface2: #24242f;
    --border: rgba(255,255,255,0.08);
    --accent: #f5c842;
    --accent2: #e05c3a;
    --text: #f0eee8;
    --muted: #888;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    gap: 2rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 0.05em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
    line-height: 1;
  }

  h1 span { color: var(--text); }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 2rem;
    width: 100%;
    max-width: 900px;
    align-items: start;
  }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* LEFT PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  textarea {
    width: 100%;
    height: 260px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }

  .btn {
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover { background: #2e2e3c; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #111;
    border-color: transparent;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 14px;
  }

  .btn-primary:hover { background: #f7d160; }
  .btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }

  .count-badge {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .count-badge strong { color: var(--accent); }

  /* RIGHT PANEL - WHEEL */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .wheel-outer {
    position: relative;
    width: 340px;
    height: 340px;
    flex-shrink: 0;
  }

  .wheel-outer canvas {
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(245,200,66,0.15), 0 0 0 4px rgba(255,255,255,0.05);
  }

  .pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 32px solid var(--accent2);
    filter: drop-shadow(0 4px 8px rgba(224,92,58,0.5));
    z-index: 10;
  }

  .center-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    background: var(--bg);
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    z-index: 5;
  }

  /* WINNER */
  .winner-box {
    display: none;
    background: linear-gradient(135deg, #1e1a0e, #2a2208);
    border: 1px solid rgba(245,200,66,0.4);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    text-align: center;
    width: 100%;
    max-width: 340px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .winner-box.show { display: block; }

  .winner-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,200,66,0.6);
    margin-bottom: 6px;
  }

  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    line-height: 1.1;
    word-break: break-word;
  }

  .trophy {
    font-size: 2rem;
    margin-bottom: 8px;
    display: block;
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* empty state canvas message */
  .empty-msg {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 2rem 1rem;
  }
</style>
</head>
<body>

<h1>ROLETA <span>DE SORTEIO</span></h1>

<div class="layout">

  <!-- LEFT: input -->
  <div class="panel">
    <span class="panel-label">Lista de participantes</span>
    <textarea id="nameInput" placeholder="Cole sua lista aqui. Qualquer formato funciona:&#10;&#10;* João Silva&#10;- Maria Souza&#10;Pedro Lima&#10;1. Ana Santos"></textarea>
    <button class="btn" onclick="buildWheel()">Atualizar roleta</button>
    <p class="count-badge" id="countBadge"></p>
  </div>

  <!-- RIGHT: wheel -->
  <div class="wheel-section">
    <div class="wheel-outer" id="wheelOuter">
      <div class="pointer"></div>
      <canvas id="wheel" width="340" height="340"></canvas>
      <div class="center-circle"></div>
    </div>

    <button class="btn btn-primary" id="spinBtn" onclick="spin()" disabled>⟳ &nbsp;Girar!</button>

    <div class="winner-box" id="winnerBox">
      <span class="trophy">🏆</span>
      <div class="winner-label">Vencedor</div>
      <div class="winner-name" id="winnerName"></div>
    </div>
  </div>

</div>

<script>
const COLORS = [
  '#534AB7','#0F6E56','#A32D2D','#854F0B',
  '#185FA5','#993556','#3B6D11','#993C1D',
  '#3C3489','#085041','#633806','#72243E',
  '#0C447C','#27500A','#791F1F','#5F5E5A'
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const CX = 170, CY = 170, R = 162;

let names = [], angle = 0, spinning = false;

function parseLine(s) {
  return s.replace(/^[\s\*\-\•\–\—\d\.\)\:]+/, '').trim();
}

function buildWheel() {
  const raw = document.getElementById('nameInput').value;
  const lines = raw.split('\n')
    .map(parseLine)
    .filter(l => l.length > 0);
  names = [...new Set(lines)];

  const badge = document.getElementById('countBadge');
  badge.innerHTML = names.length > 0
    ? `<strong>${names.length}</strong> participantes`
    : '';

  document.getElementById('spinBtn').disabled = names.length < 2;
  document.getElementById('winnerBox').classList.remove('show');

  drawWheel(angle);
}

function drawWheel(rot) {
  ctx.clearRect(0, 0, 340, 340);

  if (names.length === 0) {
    ctx.fillStyle = '#1a1a22';
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.font = '14px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Cole sua lista e clique', CX, CY - 10);
    ctx.fillText('"Atualizar roleta"', CX, CY + 10);
    return;
  }

  const slice = (2 * Math.PI) / names.length;

  names.forEach((name, i) => {
    const start = rot + i * slice;
    const end   = start + slice;
    const color = COLORS[i % COLORS.length];

    // segment
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // separator
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + slice / 2);

    const maxLen = names.length <= 12 ? 18 : names.length <= 20 ? 15 : 12;
    const label  = name.length > maxLen ? name.slice(0, maxLen - 1) + '…' : name;
    const fs     = names.length <= 12 ? 13 : names.length <= 20 ? 11 : 10;

    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur  = 3;
    ctx.font = `600 ${fs}px 'DM Sans', sans-serif`;
    ctx.fillText(label, R - 10, fs / 3);
    ctx.restore();
  });

  // rim
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spin() {
  if (spinning || names.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerBox').classList.remove('show');

  const slice   = (2 * Math.PI) / names.length;
  const winIdx  = Math.floor(Math.random() * names.length);

  // target: winner segment centered under pointer (top = -PI/2)
  const targetMid   = winIdx * slice + slice / 2;
  const targetAngle = -(targetMid) - Math.PI / 2;
  const currentNorm = ((angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const targetNorm  = ((targetAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  let   delta       = targetNorm - currentNorm;
  if (delta <= 0) delta += 2*Math.PI;

  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const totalDelta = extraSpins + delta;
  const duration   = 4200 + Math.random() * 800;
  const startAngle = angle;
  const startTime  = performance.now();

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    angle = startAngle + totalDelta * easeOut(t);
    drawWheel(angle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showWinner(names[winIdx]);
    }
  }
  requestAnimationFrame(frame);
}

function showWinner(name) {
  document.getElementById('winnerName').textContent = name;
  const box = document.getElementById('winnerBox');
  box.classList.remove('show');
  void box.offsetWidth; // reset animation
  box.classList.add('show');
}

// pre-load with example
document.getElementById('nameInput').value = ``;
buildWheel();
</script>
</body>
</html>
